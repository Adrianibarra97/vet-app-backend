server:
  port: 8080 #Cambie al puerto 8080, para no usar el 9000 de la otra app
  error:
    whitelabel:
      enabled: false
    include-message: always

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/postgres  # Cambié el puerto a 5433
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    root: INFO
